name: 每日台股模擬交易

on:
  schedule:
    - cron: '0 21 * * 1-5'   # UTC 週二到週六 21:00 = 台灣週二到週六 05:00
  workflow_dispatch:           # 允許手動觸發（方便測試）

jobs:
  run-daily:
    runs-on: ubuntu-latest

    steps:
      # 1. 取得程式碼（包含 portfolio.json 歷史資料）
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 安裝 Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安裝套件
      - name: Install packages
        run: pip install yfinance pandas numpy requests

      # 4. 執行每日交易系統
      - name: Run daily trading system
        run: python run_daily.py
        env:
          PYTHONIOENCODING: utf-8

      # 5. 把更新的資料和 index.html 推回 GitHub
      - name: Commit and push results
        run: |
          git config user.name "Stock Bot"
          git config user.email "bot@github.com"
          git add index.html data/portfolio.json reports/
          git diff --staged --quiet || git commit -m "Daily update $(date +'%Y-%m-%d')"
          git push
